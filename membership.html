    <h2>Register as a Library Member</h2>

    <p>Fill in the form below to become a member of the library.</p>

    <form>
        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <label>Student ID:</label><br>
        <input type="text" name="studentid"><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Course/Department:</label><br>
        <input type="text" name="course"><br><br>

        <label>Membership Type:</label><br>
        <input type="radio" name="membership" value="student"> Student<br>
        <input type="radio" name="membership" value="staff"> Staff<br><br>

        <label>Reason for Joining:</label><br>
        <textarea name="reason" rows="5" cols="40"></textarea><br><br>

        <button type="submit">Submit Registration</button>
        <button type="reset">Clear Form</button>
    </form>
