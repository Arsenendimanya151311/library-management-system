<!DOCTYPE html>
<html>
<head>
    <title>Library Membership</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Library Membership Registration</h1>
    <p class="page-ribbon">Membership Desk</p>
    <p>Complete the form below to join our learning community.</p>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="books.html">Books</a>
            <a href="gallery.html">Gallery</a>
            <a class="active" href="membership.html">Membership</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </nav>

    <section class="content-card">
        <h2>Register as a Library Member</h2>
        <p>Fill in the form below to become a member of the library.</p>

        <form>
            <div class="form-grid">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input id="fullname" type="text" name="fullname" required>
                </div>

                <div class="form-group">
                    <label for="studentid">Student ID</label>
                    <input id="studentid" type="text" name="studentid" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input id="phone" type="tel" name="phone">
                </div>

                <div class="form-group full">
                    <label for="course">Course/Department</label>
                    <input id="course" type="text" name="course">
                </div>

                <div class="form-group full">
                    <label>Membership Type</label>
                    <div class="radio-row">
                        <label><input type="radio" name="membership" value="student" checked> Student</label>
                        <label><input type="radio" name="membership" value="staff"> Staff</label>
                    </div>
                </div>

                <div class="form-group full">
                    <label for="reason">Reason for Joining</label>
                    <textarea id="reason" name="reason"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit">Submit Registration</button>
                <button class="secondary" type="reset">Clear Form</button>
            </div>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Smart Library Management System</p>
    </footer>

</body>
</html>
